name: Build Sub2API CCS Fix Safe Update

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4
        with:
          path: patch

      - name: Checkout official Sub2API tag
        uses: actions/checkout@v4
        with:
          repository: Wei-Shaw/sub2api
          ref: v0.1.137
          path: sub2api

      - name: Apply CCS fix
        run: |
          cp patch/apply-ccsfix.sh sub2api/apply-ccsfix.sh
          cd sub2api
          chmod +x apply-ccsfix.sh
          ./apply-ccsfix.sh

      - name: Build patched image
        run: |
          cd sub2api
          docker build \
            --build-arg VERSION=0.1.137 \
            --build-arg COMMIT=ccsfix-safeupdate \
            -t sub2api:0.1.137-ccsfix-safeupdate-v2 .

      - name: Verify patched binary markers
        run: |
          docker run --rm --entrypoint sh sub2api:0.1.137-ccsfix-safeupdate-v2 -lc \
            'strings /app/sub2api | grep -E "cc-switch/1\.0|/v1/usage\?days=30" | head -20'
          docker run --rm --entrypoint sh sub2api:0.1.137-ccsfix-safeupdate-v2 -lc \
            'if strings /app/sub2api | grep -q "{{baseUrl}}/v1/usage"; then echo "OLD_PLACEHOLDER_STILL_EXISTS"; exit 1; else echo "PLACEHOLDER_REMOVED_OK"; fi'
          docker run --rm --entrypoint sh sub2api:0.1.137-ccsfix-safeupdate-v2 -lc \
            'strings /app/sub2api | grep -E "UPDATE_UNSUPPORTED_IN_CONTAINER|dockerModeHint|Docker deployments do not support in-app updates" | head -20'
          docker run --rm --entrypoint sh sub2api:0.1.137-ccsfix-safeupdate-v2 -lc \
            'strings /app/sub2api | grep -E "0\.1\.137|ccsfix-safeupdate" | head -20'

      - name: Export image tar
        run: |
          docker save sub2api:0.1.137-ccsfix-safeupdate-v2 | gzip > sub2api-0.1.137-ccsfix-safeupdate-v2.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-0.1.137-ccsfix-safeupdate-v2
          path: sub2api-0.1.137-ccsfix-safeupdate-v2.tar.gz
          if-no-files-found: error      - name: Verify patched binary markers
        run: |
          docker run --rm --entrypoint sh sub2api:0.1.137-ccsfix-safeupdate -lc \
            'strings /app/sub2api | grep -E "cc-switch/1\.0|/v1/usage\?days=30" | head -20'
          docker run --rm --entrypoint sh sub2api:0.1.137-ccsfix-safeupdate -lc \
            'if strings /app/sub2api | grep -q "{{baseUrl}}/v1/usage"; then echo "OLD_PLACEHOLDER_STILL_EXISTS"; exit 1; else echo "PLACEHOLDER_REMOVED_OK"; fi'
          docker run --rm --entrypoint sh sub2api:0.1.137-ccsfix-safeupdate -lc \
            'strings /app/sub2api | grep -E "UPDATE_UNSUPPORTED_IN_CONTAINER|dockerModeHint|Docker deployments do not support in-app updates" | head -20'

      - name: Export image tar
        run: |
          docker save sub2api:0.1.137-ccsfix-safeupdate | gzip > sub2api-0.1.137-ccsfix-safeupdate.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-0.1.137-ccsfix-safeupdate
          path: sub2api-0.1.137-ccsfix-safeupdate.tar.gz
          if-no-files-found: error
