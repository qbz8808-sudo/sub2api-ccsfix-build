name: Build Sub2API CCS Fix Safe Update V2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4
        with:
          path: patch

      - name: Checkout official Sub2API tag
        uses: actions/checkout@v4
        with:
          repository: Wei-Shaw/sub2api
          ref: v0.1.137
          path: sub2api

      - name: Apply patch
        run: |
          cp patch/apply-ccsfix.sh sub2api/apply-ccsfix.sh
          cd sub2api
          chmod +x apply-ccsfix.sh
          ./apply-ccsfix.sh

      - name: Build image
        run: |
          cd sub2api
          docker build --build-arg VERSION=0.1.137 --build-arg COMMIT=ccsfix-safeupdate-v2 -t sub2api:0.1.137-ccsfix-safeupdate-v2 .

      - name: Export image
        run: |
          cd sub2api
          docker save sub2api:0.1.137-ccsfix-safeupdate-v2 | gzip > sub2api-0.1.137-ccsfix-safeupdate-v2.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-0.1.137-ccsfix-safeupdate-v2
          path: sub2api/sub2api-0.1.137-ccsfix-safeupdate-v2.tar.gz
