name: Build Sub2API CCS Fix Safe Update V4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout patch repo
        uses: actions/checkout@v4
        with:
          path: patch

      - name: Resolve latest official Sub2API tag
        id: version
        run: |
          latest_tag="$(git ls-remote --tags --sort='v:refname' https://github.com/Wei-Shaw/sub2api.git 'refs/tags/v*' | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | tail -n 1)"
          if [ -z "$latest_tag" ]; then
            echo "Failed to resolve latest Sub2API tag" >&2
            exit 1
          fi
          echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "version=${latest_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout official Sub2API latest tag
        uses: actions/checkout@v4
        with:
          repository: Wei-Shaw/sub2api
          ref: ${{ steps.version.outputs.tag }}
          path: sub2api

      - name: Apply patch
        run: |
          cp patch/apply-ccsfix.sh sub2api/apply-ccsfix.sh
          cd sub2api
          chmod +x apply-ccsfix.sh
          ./apply-ccsfix.sh

      - name: Build image
        run: |
          cd sub2api
          docker build --build-arg VERSION=${{ steps.version.outputs.version }} --build-arg COMMIT=ccsfix-safeupdate-${{ steps.version.outputs.tag }} -t ghcr.io/qbz8808-sudo/sub2api-ccsfix-safeupdate:latest -t ghcr.io/qbz8808-sudo/sub2api-ccsfix-safeupdate:${{ steps.version.outputs.version }}-ccsfix-safeupdate .

      - name: Verify image
        run: |
          docker run --rm --entrypoint sh ghcr.io/qbz8808-sudo/sub2api-ccsfix-safeupdate:latest -lc 'strings /app/sub2api | grep -E "cc-switch/1\.0|/v1/usage\?days=30|DOCKER_UPDATE_URL" | head -20'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker push ghcr.io/qbz8808-sudo/sub2api-ccsfix-safeupdate:latest
          docker push ghcr.io/qbz8808-sudo/sub2api-ccsfix-safeupdate:${{ steps.version.outputs.version }}-ccsfix-safeupdate

      - name: Export image
        run: |
          cd sub2api
          docker save ghcr.io/qbz8808-sudo/sub2api-ccsfix-safeupdate:latest | gzip > sub2api-${{ steps.version.outputs.version }}-ccsfix-safeupdate.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-${{ steps.version.outputs.version }}-ccsfix-safeupdate
          path: sub2api/sub2api-${{ steps.version.outputs.version }}-ccsfix-safeupdate.tar.gz
